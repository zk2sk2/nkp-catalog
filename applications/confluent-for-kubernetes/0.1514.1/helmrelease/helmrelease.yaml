# applications/confluent-platform-kraft/8.2.0/helmrelease/cfk-helmrelease.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cfk-source
  namespace: ${releaseNamespace}
spec:
  interval: 6h
  url: oci://packages.confluent.io/helm/confluent-for-kubernetes
  ref:
    tag: 3.2.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: confluent-operator
  namespace: ${releaseNamespace}
spec:
  interval: 15s
  chartRef:
    kind: OCIRepository
    name: cfk-source
    namespace: ${releaseNamespace}
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
