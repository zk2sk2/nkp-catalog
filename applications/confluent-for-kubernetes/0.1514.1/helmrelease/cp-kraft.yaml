apiVersion: platform.confluent.io/v1beta1      clusterRef:
        name: kraftcontroller

  dataVolumeCapacity: 10Gi
  image:
    application: docker.io/confluentinc/cp-server:8.2.0
    init: docker.io/confluentinc/confluent-init-container:3.2.0

  # 1 broker前提のため、内部トピック等のRFを1へ寄せる（single-node例に同種の設定あり）
  configOverrides:
    server:
      - "offsets.topic.replication.factor=1"
      - "confluent.metadata.topic.replication.factor=1"
      - "confluent.metrics.reporter.topic.replicas=1"
      - "confluent.license.topic.replication.factor=1"
      - "confluent.balancer.topic.replication.factor=1"
      - "confluent.tier.metadata.replication.factor=1"
      - "confluent.security.event.logger.exporter.kafka.topic.replicas=1"
      - "event.logger.exporter.kafka.topic.replicas=1"
``
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: ${releaseNamespace}
spec:
  # Confluent公式：KRaft controller replicas は奇数かつ 3以上が必須
  replicas: 3
  dataVolumeCapacity: 10Gi
  image:
    # CFK 3.2.0 のリリースノート上、CP component images は 8.2.0
    application: docker.io/confluentinc/cp-server:8.2.0
    init: docker.io/confluentinc/confluent-init-container:3.2.0
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: ${releaseNamespace}
spec:
  # ★要件：Brokerは1台
  replicas: 1

  dependencies:
    kRaftController:
